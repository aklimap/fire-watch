# A placer dans votre depot a : .github/workflows/fire-watch.yml
name: fire-watch

on:
  schedule:
    - cron: "*/20 * * * *"   # toutes les 20 minutes (heure UTC)
  workflow_dispatch: {}        # bouton "Run workflow" pour lancer a la main

# Necessaire pour re-committer les fichiers d'etat dans le depot
permissions:
  contents: write

# Empeche deux executions de se chevaucher et de corrompre l'etat
concurrency:
  group: fire-watch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer la surveillance
        env:
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python firms_watch.py

      - name: Persister l'etat dans le depot
        run: |
          git config user.name  "fire-watch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add active_events.json alerts_sent.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement d'etat a committer."
          else
            git commit -m "etat: maj automatique [skip ci]"
            git push
          fi
